name: Sync petitions from Qualtrics

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - qualtrics_sync

concurrency:
  group: qualtrics-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync petition files
        env:
          QUALTRICS_BASE_URL: ${{ secrets.QUALTRICS_BASE_URL }}
          QUALTRICS_API_TOKEN: ${{ secrets.QUALTRICS_API_TOKEN }}
          QUALTRICS_SURVEY_ID: ${{ secrets.QUALTRICS_SURVEY_ID }}
          QUALTRICS_TITLE_COLUMN: ${{ secrets.QUALTRICS_TITLE_COLUMN }}
          QUALTRICS_BODY_COLUMN: ${{ secrets.QUALTRICS_BODY_COLUMN }}
          QUALTRICS_URL_ENCRYPTION_KEY: ${{ secrets.QUALTRICS_URL_ENCRYPTION_KEY }}
          QUALTRICS_RESPONSE_ID_COLUMN: ${{ secrets.QUALTRICS_RESPONSE_ID_COLUMN }}
          QUALTRICS_PUBLISHED_COLUMN: ${{ secrets.QUALTRICS_PUBLISHED_COLUMN }}
          QUALTRICS_PUBLISHED_VALUE: ${{ secrets.QUALTRICS_PUBLISHED_VALUE }}
          QUALTRICS_RECORDED_DATE_COLUMN: ${{ secrets.QUALTRICS_RECORDED_DATE_COLUMN }}
          QUALTRICS_TARGET_RESPONSE_ID: ${{ github.event.client_payload.response_id || '' }}
          QUALTRICS_TARGET_TITLE: ${{ github.event.client_payload.title || '' }}
          QUALTRICS_TARGET_BODY: ${{ github.event.client_payload.body || '' }}
        run: python scripts/sync_qualtrics_petitions.py

      - name: Create or update pull request
        id: create_pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            echo "pull-request-number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="codex/qualtrics-sync"
          TITLE="Sync petitions from Qualtrics"
          BODY="Automated sync of petition files from Qualtrics responses."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          pr_number="$(gh pr list --repo "$REPO" --head "$BRANCH" --base "$BASE_BRANCH" --json number --jq '.[0].number')"
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            gh pr create \
              --repo "$REPO" \
              --base "$BASE_BRANCH" \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$BODY"
            pr_number="$(gh pr view "$BRANCH" --repo "$REPO" --json number --jq '.number')"
          else
            gh pr edit "$pr_number" \
              --repo "$REPO" \
              --title "$TITLE" \
              --body "$BODY"
          fi

          echo "pull-request-number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Auto-approve pull request
        if: steps.create_pr.outputs.pull-request-number != '' && env.APPROVAL_TOKEN != ''
        uses: actions/github-script@v7
        env:
          APPROVAL_TOKEN: ${{ secrets.QUALTRICS_PR_BOT_TOKEN }}
        with:
          github-token: ${{ env.APPROVAL_TOKEN }}
          script: |
            const prNumber = Number("${{ steps.create_pr.outputs.pull-request-number }}");
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: "APPROVE",
              body: "Auto-approved by Qualtrics sync reviewer bot."
            });
